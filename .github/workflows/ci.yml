name: test matrix

on: push

jobs:
  job_1:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{matrix.os}}
    steps:
    - name: job _1
      run : echo "hello frr from job 1" >> text.txt 
    
    - name: upload the text.txt 
      uses: actions/upload-artifact@v4
      with:
        name: file
        path: text.txt

  job_2:
    needs: job_1
    runs-on: [self-hosted, linux]
    timeout-minutes: 1
    steps:
    - name: download the text.txt
      uses: actions/download-artifact@v4
      with:
        name: file

    - name: job _2
      run : echo "im the job 2 i add this" >> text.txt 
    
    - uses: actions/upload-artifact@v4
      with:
        name: file-v2
        path: text.txt
  
  job_3:
    needs: job_2
    runs-on: ubuntu-latest
    steps:
    - name: download the text.txt
      uses: actions/download-artifact@v4
      with:
        name: file-v2
    - name: job _3
      run : cat text.txt
